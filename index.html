<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>名字大战 - Name Battle</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 10px;
        }
        .container { max-width: 1100px; margin: 0 auto; }
        h1 {
            text-align: center;
            font-size: 1.8rem;
            background: linear-gradient(90deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 5px;
        }
        .subtitle { text-align: center; color: #888; margin-bottom: 15px; font-size: 0.9rem; }
        
        .lang-toggle { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .lang-btn {
            padding: 8px 20px;
            border: 2px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            color: #fff;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
        }
        .lang-btn.active { border-color: #4d96ff; background: rgba(77,150,255,0.2); }
        
        .setup-panel {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .mode-selector { display: flex; gap: 10px; margin-bottom: 25px; }
        .mode-btn {
            flex: 1;
            padding: 15px;
            border: 2px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 1rem;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .mode-btn.active { border-color: #4d96ff; background: rgba(77,150,255,0.2); }
        .mode-btn:hover { border-color: #4d96ff; }
        
        .players-section { margin-bottom: 20px; }
        .players-section h3 {
            margin-bottom: 15px;
            color: #aaa;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .player-inputs {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .player-input { display: flex; gap: 10px; }
        .player-input input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 1rem;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.3s;
        }
        .player-input input:focus { border-color: #4d96ff; }
        .player-input input::placeholder { color: #666; }
        .player-num {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 30px;
            height: 30px;
            background: rgba(77,150,255,0.3);
            border-radius: 50%;
            font-weight: bold;
            color: #4d96ff;
        }
        .add-player-btn {
            padding: 10px 20px;
            background: rgba(107,203,119,0.2);
            border: 2px solid #6bcb77;
            color: #6bcb77;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
        }
        .add-player-btn:hover { background: rgba(107,203,119,0.3); }
        .start-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #ff6b6b, #ff8e53);
            border: none;
            color: #fff;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        .start-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(255,107,107,0.4); }
        
        .battle-arena { display: none; }
        .battle-arena.active { display: block; }
        .back-btn {
            padding: 12px 25px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.2);
            color: #fff;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            margin-bottom: 20px;
            transition: all 0.3s;
        }
        .back-btn:hover { background: rgba(255,255,255,0.2); }
        
        /* Tournament layout */
        .tournament-view {
            display: flex;
            gap: 30px;
            margin-bottom: 20px;
        }
        .battle-area {
            flex: 1;
            min-width: 300px;
        }
        .bracket-area {
            flex: 1;
        }
        
        .vs-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .player-card {
            background: rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 25px;
            width: 280px;
            text-align: center;
            border: 2px solid rgba(255,255,255,0.1);
            transition: all 0.3s;
        }
        .player-card.winner { border-color: #6bcb77; box-shadow: 0 0 30px rgba(107,203,119,0.3); }
        .player-card.loser { opacity: 0.5; border-color: #ff6b6b; }
        .player-card.tie { border-color: #ffd93d; }
        .player-card.active { border-color: #4d96ff; box-shadow: 0 0 20px rgba(77,150,255,0.3); }
        .player-name { font-size: 1.5rem; font-weight: bold; margin-bottom: 15px; }
        .hp-bar-container {
            background: rgba(0,0,0,0.5);
            border-radius: 10px;
            height: 30px;
            overflow: hidden;
            margin-bottom: 10px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .hp-bar {
            height: 100%;
            background: linear-gradient(90deg, #6bcb77, #4d96ff);
            transition: width 0.3s ease;
            border-radius: 10px;
        }
        .hp-bar.danger { background: linear-gradient(90deg, #ff6b6b, #ff8e53); }
        .hp-text { font-size: 1.2rem; font-weight: bold; }
        .move-damage {
            margin-top: 15px;
            font-size: 1.1rem;
            color: #ff6b6b;
        }
        .vs-text {
            font-size: 3rem;
            font-weight: bold;
            color: #ffd93d;
            text-shadow: 0 0 20px rgba(255,217,61,0.5);
        }
        
        .battle-log {
            background: rgba(0,0,0,0.4);
            border-radius: 12px;
            padding: 20px;
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .battle-log h3 { color: #aaa; margin-bottom: 15px; font-size: 0.9rem; text-transform: uppercase; }
        .log-entry {
            padding: 8px 12px;
            margin-bottom: 5px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            background: rgba(255,255,255,0.05);
        }
        .log-entry.round { color: #4d96ff; font-weight: bold; }
        .log-entry.attack { color: #ff6b6b; }
        .log-entry.eliminated { color: #6bcb77; font-weight: bold; background: rgba(107,203,119,0.2); }
        .log-entry.winner { color: #ffd93d; font-weight: bold; background: rgba(255,217,61,0.2); }
        .log-entry.tie { color: #ffd93d; font-weight: bold; background: rgba(255,217,61,0.3); }
        .log-entry.header { color: #888; font-style: italic; }
        
        .tournament-bracket { }
        .bracket-title { text-align: center; font-size: 1.3rem; color: #ffd93d; margin-bottom: 20px; }
        .bracket-container { display: flex; justify-content: center; align-items: center; gap: 15px; flex-wrap: wrap; }
        .bracket-round { display: flex; flex-direction: column; gap: 10px; }
        .bracket-match {
            background: rgba(255,255,255,0.08);
            border-radius: 10px;
            padding: 12px;
            text-align: center;
            min-width: 140px;
            border: 2px solid rgba(255,255,255,0.1);
            cursor: pointer;
            transition: all 0.3s;
        }
        .bracket-match:hover { border-color: rgba(255,255,255,0.3); transform: scale(1.02); }
        .bracket-match.completed { border-color: #6bcb77; }
        .bracket-match.current { border-color: #4d96ff; box-shadow: 0 0 15px rgba(77,150,255,0.3); }
        .bracket-match.clickable { cursor: pointer; }
        .bracket-player { padding: 4px; font-size: 0.85rem; }
        .bracket-player.winner { color: #6bcb77; font-weight: bold; }
        .bracket-player.loser { color: #666; text-decoration: line-through; }
        .bracket-player.pending { color: #888; }
        .bracket-player.bye { color: #4d96ff; font-style: italic; }
        .bracket-player.current-player { color: #ffd93d; }
        .bracket-vs { color: #ffd93d; font-size: 0.75rem; margin: 3px 0; }
        
        .champion-popup {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .champion-popup.active { display: flex; }
        .champion-content {
            background: linear-gradient(135deg, rgba(255,217,61,0.2), rgba(107,203,119,0.2));
            border: 3px solid #ffd93d;
            border-radius: 20px;
            padding: 50px;
            text-align: center;
            animation: popupIn 0.5s ease;
        }
        @keyframes popupIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .champion-title { font-size: 1.5rem; color: #aaa; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 3px; }
        .champion-name { font-size: 3.5rem; font-weight: bold; background: linear-gradient(90deg, #ffd93d, #ff6b6b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 15px; }
        .champion-congrats { font-size: 1.5rem; color: #6bcb77; margin-bottom: 30px; }
        .champion-close {
            padding: 12px 30px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.3);
            color: #fff;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
        }
        .champion-close:hover { background: rgba(255,255,255,0.2); }
        
        .battle-progress { text-align: center; margin-bottom: 20px; }
        .round-counter { font-size: 1.2rem; color: #888; margin-bottom: 10px; }
        .progress-bar { background: rgba(255,255,255,0.1); border-radius: 10px; height: 8px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #ff6b6b, #ffd93d, #6bcb77); transition: width 0.3s; }
        
        .match-info {
            text-align: center;
            color: #888;
            margin-bottom: 10px;
            font-size: 0.9rem;
        }
        
        /* Mobile Responsive */
        @media (max-width: 768px) {
            body { padding: 10px; }
            h1 { font-size: 1.5rem; }
            .subtitle { font-size: 0.8rem; margin-bottom: 10px; }
            .setup-panel { padding: 15px; }
            .mode-selector { flex-direction: column; gap: 8px; }
            .mode-btn { padding: 12px; font-size: 0.9rem; }
            .player-inputs { grid-template-columns: 1fr; gap: 10px; }
            .player-input input { font-size: 0.9rem; padding: 10px; }
            .start-btn { padding: 14px; font-size: 1.1rem; }
            
            /* Tournament layout - stack vertically on mobile */
            .tournament-view { flex-direction: column; gap: 15px; }
            .battle-area, .bracket-area { width: 100%; min-width: unset; }
            
            /* VS container */
            .vs-container { gap: 15px; }
            .player-card { width: 140px; padding: 15px; }
            .player-name { font-size: 1.1rem; }
            .hp-text { font-size: 1rem; }
            .vs-text { font-size: 1.5rem; }
            .move-damage { font-size: 0.85rem; }
            
            /* Bracket */
            .bracket-container { flex-wrap: nowrap; overflow-x: auto; gap: 10px; padding-bottom: 10px; }
            .bracket-round { flex-shrink: 0; }
            .bracket-match { min-width: 100px; padding: 8px; }
            .bracket-player { font-size: 0.75rem; }
            .bracket-vs { font-size: 0.65rem; }
            
            /* Battle log */
            .battle-log { max-height: 200px; }
            .log-entry { font-size: 0.8rem; padding: 6px 8px; }
            
            /* Champion popup */
            .champion-content { padding: 30px; margin: 20px; }
            .champion-name { font-size: 2rem; }
            .champion-title { font-size: 1rem; }
            .champion-congrats { font-size: 1rem; }
        }
        
        @media (max-width: 400px) {
            h1 { font-size: 1.3rem; }
            .player-card { width: 120px; padding: 10px; }
            .vs-text { font-size: 1.2rem; }
            .player-name { font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚔️ 名字大战 ⚔️</h1>
        <p class="subtitle">谁的招式更强？Whose name is stronger?</p>
        
        <div class="lang-toggle">
            <button class="lang-btn active" data-lang="cn" onclick="setLanguage('cn')">🇨🇳 中文</button>
            <button class="lang-btn" data-lang="en" onclick="setLanguage('en')">🇺🇸 English</button>
        </div>
        
        <div class="setup-panel" id="setupPanel">
            <div class="mode-selector">
                <button class="mode-btn active" data-mode="duel" onclick="setMode('duel')">⚔️ 1v1 对决</button>
                <button class="mode-btn" data-mode="tournament" onclick="setMode('tournament')">🏆 淘汰赛</button>
            </div>
            
            <div class="players-section">
                <h3>参赛选手</h3>
                <div class="player-inputs" id="playerInputs"></div>
                <button class="add-player-btn" id="addPlayerBtn" onclick="addPlayer()" style="display:none">+ 添加选手</button>
            </div>
            
            <button class="start-btn" id="startBtn" onclick="startBattle()">开始战斗</button>
        </div>
        
        <div class="battle-arena" id="battleArena">
            <button class="back-btn" onclick="backToSetup()">← 返回</button>
            
            <!-- Champion Popup -->
            <div class="champion-popup" id="championPopup">
                <div class="champion-content">
                    <div class="champion-title">🏆 冠军 🏆</div>
                    <div class="champion-name" id="championName"></div>
                    <div class="champion-congrats">🎉 恭喜获得最终胜利！🎉</div>
                    <button class="champion-close" onclick="closeChampionPopup()">关闭</button>
                </div>
            </div>
            
            <!-- Tournament View -->
            <div class="tournament-view" id="tournamentView">
                <div class="battle-area">
                    <div class="match-info" id="matchInfo"></div>
                    <div class="vs-container" id="vsContainer">
                        <div class="player-card" id="player1Card">
                            <div class="player-name" id="player1Name">选手1</div>
                            <div class="hp-bar-container">
                                <div class="hp-bar" id="player1HpBar"></div>
                            </div>
                            <div class="hp-text"><span id="player1Hp">600</span> / 600 HP</div>
                            <div class="move-damage" id="player1Move"></div>
                        </div>
                        <div class="vs-text">VS</div>
                        <div class="player-card" id="player2Card">
                            <div class="player-name" id="player2Name">选手2</div>
                            <div class="hp-bar-container">
                                <div class="hp-bar" id="player2HpBar"></div>
                            </div>
                            <div class="hp-text"><span id="player2Hp">600</span> / 600 HP</div>
                            <div class="move-damage" id="player2Move"></div>
                        </div>
                    </div>
                    
                    <div class="battle-progress">
                        <div class="round-counter" id="roundCounterText">回合: <span id="roundCounter">0</span></div>
                        <div class="progress-bar">
                            <div class="progress-fill" id="progressFill"></div>
                        </div>
                    </div>
                    
                    <div class="battle-log" id="battleLog">
                        <h3>⚔️ 战斗记录</h3>
                        <div id="logContent"></div>
                    </div>
                </div>
                
                <div class="bracket-area">
                    <div class="tournament-bracket" id="tournamentBracket">
                        <div class="bracket-title" id="bracketTitle">🏆 淘汰赛对阵图</div>
                        <div class="bracket-container" id="bracketContainer"></div>
                    </div>
                </div>
            </div>
            
            <!-- Duel View -->
            <div class="vs-container" id="duelVsContainer" style="display:none">
                <div class="player-card" id="duelPlayer1Card">
                    <div class="player-name" id="duelPlayer1Name">选手1</div>
                    <div class="hp-bar-container">
                        <div class="hp-bar" id="duelPlayer1HpBar"></div>
                    </div>
                    <div class="hp-text"><span id="duelPlayer1Hp">600</span> / 600 HP</div>
                    <div class="move-damage" id="duelPlayer1Move"></div>
                </div>
                <div class="vs-text">VS</div>
                <div class="player-card" id="duelPlayer2Card">
                    <div class="player-name" id="duelPlayer2Name">选手2</div>
                    <div class="hp-bar-container">
                        <div class="hp-bar" id="duelPlayer2HpBar"></div>
                    </div>
                    <div class="hp-text"><span id="duelPlayer2Hp">600</span> / 600 HP</div>
                    <div class="move-damage" id="duelPlayer2Move"></div>
                </div>
            </div>
            
            <div class="battle-progress" id="duelProgress" style="display:none">
                <div class="round-counter" id="duelRoundCounterText">回合: <span id="duelRoundCounter">0</span></div>
                <div class="progress-bar">
                    <div class="progress-fill" id="duelProgressFill"></div>
                </div>
            </div>
            
            <div class="battle-log" id="duelBattleLog" style="display:none">
                <h3>⚔️ 战斗记录</h3>
                <div id="duelLogContent"></div>
            </div>
        </div>
    </div>

        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
        }
        
        function getDamageFromHash(hash, index) {
            const useTwoDigits = index % 2 === 0;
            let hexVal = useTwoDigits && index + 1 < hash.length 
                ? hash.substring(index, index + 2) 
                : hash.substring(index % hash.length, (index % hash.length) + 1);
            let damage = parseInt(hexVal, 16) % 130;
            return damage === 0 ? Math.floor(Math.random() * 20) + 1 : damage;
        }

            document.getElementById(`${prefix}HpBar`).classList.toggle('danger', hp < 150);

        function addLogToElement(elementId, message, type) {

        async function startDuel() {
            clearLog('duelLogContent');
            const p1 = createPlayer(players[0]);
            const p2 = createPlayer(players[1]);
            p1.hash = await sha256(p1.name);
            p2.hash = await sha256(p2.name);
            
            document.getElementById('duelPlayer1Name').textContent = p1.name;
            document.getElementById('duelPlayer2Name').textContent = p2.name;
            setHpDisplay('duelPlayer1', MAX_HP);
            setHpDisplay('duelPlayer2', MAX_HP);
            document.getElementById('duelPlayer1Move').textContent = '';
            document.getElementById('duelPlayer2Move').textContent = '';
            document.getElementById('duelPlayer1Card').classList.remove('winner', 'loser', 'tie');
            document.getElementById('duelPlayer2Card').classList.remove('winner', 'loser', 'tie');
            document.getElementById('duelRoundCounter').textContent = '0';
            
            battleState = { p1, p2, round: 0, hashIndex: 0 };
            const t = i18n[language];
            addLogToElement('duelLogContent', `${t.roundLog}: ${p1.name} VS ${p2.name}`, 'round');
            
            battleInterval = setInterval(() => runDuelRound('duel'), ROUND_INTERVAL);
        }
        
        function runDuelRound(prefix) {
            const { p1, p2, hashIndex } = battleState;
            battleState.round++;
            
            const damage1 = getDamageFromHash(p1.hash, hashIndex);
            const damage2 = getDamageFromHash(p2.hash, hashIndex);
            p2.hp = Math.max(0, p2.hp - damage1);
            p1.hp = Math.max(0, p1.hp - damage2);
            
            const move1 = getMoveName(damage1, p1.name);
            const move2 = getMoveName(damage2, p2.name);
            
            setHpDisplay('duelPlayer1', p1.hp);
            setHpDisplay('duelPlayer2', p2.hp);
            document.getElementById('duelPlayer1Move').textContent = `${move2} -${damage2}`;
            document.getElementById('duelPlayer2Move').textContent = `${move1} -${damage1}`;
            document.getElementById('duelRoundCounter').textContent = battleState.round;
            document.getElementById('duelProgressFill').style.width = `${((MAX_HP - p1.hp) / MAX_HP) * 100}%`;
            
            const t = i18n[language];
            addLogToElement('duelLogContent', `${t.round} ${battleState.round} - ${p1.name} ${move1} → ${p2.name} -${damage1}`, 'attack');
            addLogToElement('duelLogContent', `${t.round} ${battleState.round} - ${p2.name} ${move2} → ${p1.name} -${damage2}`, 'attack');
            
            const isTie = (p1.hp <= 0 && p2.hp <= 0) || battleState.round >= MAX_ROUNDS;
            
            if (p1.hp <= 0 || p2.hp <= 0 || battleState.round >= MAX_ROUNDS) {
                clearInterval(battleInterval);
                battleInterval = null;
                const p1Card = document.getElementById('duelPlayer1Card');
                const p2Card = document.getElementById('duelPlayer2Card');
                
                if (isTie) {
                    addLogToElement('duelLogContent', `💀 ${battleState.round >= MAX_ROUNDS ? MAX_ROUNDS + t.round : ''} ${t.tie}! HP: ${p1.hp} vs ${p2.hp}`, 'tie');
                    p1Card.classList.add('winner');
                    p2Card.classList.add('loser');
                } else {
                    const winner = p1.hp > 0 ? p1 : p2;
                    const loser = p1.hp > 0 ? p2 : p1;
                    addLogToElement('duelLogContent', `🏆 ${winner.name} ${t.winner}! HP: ${winner.hp}`, 'winner');
                    if (winner === p1) { p1Card.classList.add('winner'); p2Card.classList.add('loser'); }
                    else { p1Card.classList.add('loser'); p2Card.classList.add('winner'); }
                }
            }
            
            battleState.hashIndex = (hashIndex + 2) % 64;
        }
        
        async function startTournament() {
            clearLog('logContent');
            let tournamentPlayers = [...players];
            let n = tournamentPlayers.length;
            let nextPow2 = 1;
            while (nextPow2 < n) nextPow2 *= 2;
            while (tournamentPlayers.length < nextPow2) tournamentPlayers.push(null);
            
            bracketData = [];
            matchLogs = [];
            let currentRound = [];
            for (let i = 0; i < tournamentPlayers.length; i += 2) {
                const p1 = tournamentPlayers[i];
                const p2 = tournamentPlayers[i + 1];
                currentRound.push({ p1, p2, winner: null, bye: p1 && !p2 ? p1 : (!p1 && p2 ? p2 : null) });
            }
            bracketData.push(currentRound);
            renderBracket();
            await processRound();
        }
        
        async function processRound() {
            const currentRound = bracketData[bracketData.length - 1];
            
            // Check if all matches are decided
            let hasMatchesToPlay = currentRound.some(m => m.p1 && m.p2 && !m.winner);
            
            if (!hasMatchesToPlay) {
                const winners = currentRound.map(m => m.bye || m.winner);
                if (winners.length > 1) {
                    const nextRound = [];
                    for (let i = 0; i < winners.length; i += 2) {
                        nextRound.push({ 
                            p1: winners[i], p2: winners[i + 1], 
                            winner: null, 
                            bye: winners[i] && !winners[i + 1] ? winners[i] : (!winners[i] && winners[i + 1] ? winners[i + 1] : null) 
                        });
                    }
                    bracketData.push(nextRound);
                    renderBracket();
                    await processRound();
                } else if (winners.length === 1) {
                    showChampion(winners[0]);
                }
                return;
            }
            
            for (let i = 0; i < currentRound.length; i++) {
                const match = currentRound[i];
                if (match.p1 && match.p2 && !match.winner) {
                    match.winner = await runMatch(match.p1, match.p2, i);
                    renderBracket();
                }
            }
            
            setTimeout(async () => { await processRound(); }, 1500);
        }
        
        async function runMatch(p1Name, p2Name, matchIndex) {
            if (!p1Name || !p2Name) return p1Name || p2Name;
            
            // Clear and setup battle area
            clearLog('logContent');
            document.getElementById('matchInfo').textContent = '';
            document.getElementById('roundCounterText').innerHTML = `${i18n[language].round}: <span id="roundCounter">0</span>`;
            document.getElementById('progressFill').style.width = '0%';
            
            const p1 = createPlayer(p1Name);
            const p2 = createPlayer(p2Name);
            
            document.getElementById('player1Name').textContent = p1.name;
            document.getElementById('player2Name').textContent = p2.name;
            setHpDisplay('player1', MAX_HP);
            setHpDisplay('player2', MAX_HP);
            document.getElementById('player1Move').textContent = '';
            document.getElementById('player2Move').textContent = '';
            document.getElementById('player1Card').classList.remove('winner', 'loser', 'tie', 'active');
            document.getElementById('player2Card').classList.remove('winner', 'loser', 'tie', 'active');
            document.getElementById('player1Card').classList.add('active');
            document.getElementById('player2Card').classList.add('active');
            
            p1.hash = await sha256(p1.name);
            p2.hash = await sha256(p2.name);
            
            const t = i18n[language];
            addLogToElement('logContent', `${t.roundLog}: ${p1.name} VS ${p2.name}`, 'round');
            
            // Store match log
            const matchKey = `${p1Name}-vs-${p2Name}`;
            matchLogs[matchKey] = [];
            currentMatchKey = matchKey;
            
            let hashIndex = 0;
            let round = 0;
            
            return new Promise((resolve) => {
                battleInterval = setInterval(() => {
                    round++;
                    
                    const damage1 = getDamageFromHash(p1.hash, hashIndex);
                    const damage2 = getDamageFromHash(p2.hash, hashIndex);
                    p2.hp = Math.max(0, p2.hp - damage1);
                    p1.hp = Math.max(0, p1.hp - damage2);
                    
                    const move1 = getMoveName(damage1, p1.name);
                    const move2 = getMoveName(damage2, p2.name);
                    
                    setHpDisplay('player1', p1.hp);
                    setHpDisplay('player2', p2.hp);
                    document.getElementById('player1Move').textContent = `${move2} -${damage2}`;
                    document.getElementById('player2Move').textContent = `${move1} -${damage1}`;
                    document.getElementById('roundCounter').textContent = round;
                    document.getElementById('progressFill').style.width = `${((MAX_HP - p1.hp) / MAX_HP) * 100}%`;
                    
                    const logMsg1 = `${t.round} ${round}: ${p1.name} ${move1} → ${p2.name} -${damage1}`;
                    const logMsg2 = `${t.round} ${round}: ${p2.name} ${move2} → ${p1.name} -${damage2}`;
                    addLogToElement('logContent', logMsg1, 'attack');
                    addLogToElement('logContent', logMsg2, 'attack');
                    matchLogs[matchKey].push({ msg: logMsg1, type: 'attack' });
                    matchLogs[matchKey].push({ msg: logMsg2, type: 'attack' });
                    
                    hashIndex = (hashIndex + 2) % 64;
                    
                    const isTie = (p1.hp <= 0 && p2.hp <= 0) || round >= MAX_ROUNDS;
                    
                    if (p1.hp <= 0 || p2.hp <= 0 || round >= MAX_ROUNDS) {
                        clearInterval(battleInterval);
                        battleInterval = null;
                        
                        let winner;
                        if (isTie) {
                            winner = p1.name; // Left side (home) wins in tie
                            const tieMsg = `💀 ${round >= MAX_ROUNDS ? MAX_ROUNDS + t.round : ''} ${t.tie}! HP: ${p1.hp} vs ${p2.hp}`;
                            addLogToElement('logContent', tieMsg, 'tie');
                            matchLogs[matchKey].push({ msg: tieMsg, type: 'tie' });
                        } else {
                            winner = p1.hp > 0 ? p1.name : p2.name;
                            const winMsg = `🏆 ${winner} ${t.winner}!`;
                            addLogToElement('logContent', winMsg, 'winner');
                            matchLogs[matchKey].push({ msg: winMsg, type: 'winner' });
                        }
                        
                        document.getElementById('player1Card').classList.remove('active');
                        document.getElementById('player2Card').classList.remove('active');
                        
                        setTimeout(() => resolve(winner), 500);
                    }
                }, ROUND_INTERVAL);
            });
        }

        function renderBracket() {
            const container = document.getElementById('bracketContainer');
            container.innerHTML = '';
            const t = i18n[language];
            const roundNames = t.roundName;
            
            bracketData.forEach((round, roundIdx) => {
                const roundDiv = document.createElement('div');
                roundDiv.className = 'bracket-round';
                
                const displayIdx = bracketData.length - 1 - roundIdx;
                const nameDiv = document.createElement('div');
                nameDiv.style.cssText = 'text-align:center;color:#ffd93d;margin-bottom:10px;font-size:0.85rem;';
                nameDiv.textContent = roundNames[displayIdx] || `${displayIdx + 1}`;
                roundDiv.appendChild(nameDiv);
                
                round.forEach((match, matchIdx) => {
                    const matchDiv = document.createElement('div');
                    matchDiv.className = 'bracket-match';
                    if (match.winner) matchDiv.classList.add('completed');
                    if (match.bye) matchDiv.classList.add('completed');
                    
                    // Determine if clickable to replay
                    const matchKey = `${match.p1}-vs-${match.p2}`;
                    const hasLog = matchLogs[matchKey] && matchLogs[matchKey].length > 0;
                    if (hasLog && match.winner) {
                        matchDiv.classList.add('clickable');
                        matchDiv.title = t.clickToReplay;
                        matchDiv.onclick = () => replayMatch(match.p1, match.p2);
                    }
                    
                    let p1Class = 'pending', p2Class = 'pending';
                    let p1Text = match.p1 || '?', p2Text = match.p2 || '?';
                    
                    if (match.bye) {
                        p1Class = 'bye'; p2Class = 'bye';
                        p1Text = match.p1 || '?'; p2Text = match.p2 || '?';
                    } else if (match.winner) {
                        p1Class = match.winner === match.p1 ? 'winner' : 'loser';
                        p2Class = match.winner === match.p2 ? 'winner' : 'loser';
                    }
                    
                    matchDiv.innerHTML = `
                        <div class="bracket-player ${p1Class}">${p1Text}</div>
                        <div class="bracket-vs">VS</div>
                        <div class="bracket-player ${p2Class}">${p2Text}</div>
                    `;
                    roundDiv.appendChild(matchDiv);
                });
                
                container.appendChild(roundDiv);
            });
        }
        
        function replayMatch(p1Name, p2Name) {
            const matchKey = `${p1Name}-vs-${p2Name}`;
            const logs = matchLogs[matchKey];
            if (!logs) return;
            
            clearLog('logContent');
            document.getElementById('matchInfo').textContent = `${p1Name} VS ${p2Name} (回放)`;
            
            // Display stored logs
            logs.forEach(log => {
                addLogToElement('logContent', log.msg, log.type);
            });
            
            // Set final HP display based on winner
            const lastLog = logs[logs.length - 1];
            if (lastLog && lastLog.type === 'winner') {
                // Extract winner from log
            }
        }
        
        updatePlayerInputs();
    </script>
