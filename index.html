<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>名字大战 - Name Battle</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        h1 {
            text-align: center;
            font-size: 2.5rem;
            background: linear-gradient(90deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        .subtitle { text-align: center; color: #888; margin-bottom: 30px; font-size: 1.1rem; }
        
        /* Language Toggle */
        .lang-toggle {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .lang-btn {
            padding: 8px 20px;
            border: 2px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            color: #fff;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
        }
        .lang-btn.active { border-color: #4d96ff; background: rgba(77,150,255,0.2); }
        
        .setup-panel {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .mode-selector { display: flex; gap: 10px; margin-bottom: 25px; }
        .mode-btn {
            flex: 1;
            padding: 15px;
            border: 2px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 1rem;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .mode-btn.active { border-color: #4d96ff; background: rgba(77,150,255,0.2); }
        .mode-btn:hover { border-color: #4d96ff; }
        
        .players-section { margin-bottom: 20px; }
        .players-section h3 {
            margin-bottom: 15px;
            color: #aaa;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .player-inputs {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .player-input { display: flex; gap: 10px; }
        .player-input input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 1rem;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.3s;
        }
        .player-input input:focus { border-color: #4d96ff; }
        .player-input input::placeholder { color: #666; }
        .player-num {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 30px;
            height: 30px;
            background: rgba(77,150,255,0.3);
            border-radius: 50%;
            font-weight: bold;
            color: #4d96ff;
        }
        .add-player-btn {
            padding: 10px 20px;
            background: rgba(107,203,119,0.2);
            border: 2px solid #6bcb77;
            color: #6bcb77;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
        }
        .add-player-btn:hover { background: rgba(107,203,119,0.3); }
        .start-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #ff6b6b, #ff8e53);
            border: none;
            color: #fff;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        .start-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(255,107,107,0.4); }
        .start-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        
        .battle-arena { display: none; }
        .battle-arena.active { display: block; }
        .back-btn {
            padding: 12px 25px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.2);
            color: #fff;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            margin-bottom: 20px;
            transition: all 0.3s;
        }
        .back-btn:hover { background: rgba(255,255,255,0.2); }
        
        .vs-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .player-card {
            background: rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 25px;
            width: 280px;
            text-align: center;
            border: 2px solid rgba(255,255,255,0.1);
            transition: all 0.3s;
        }
        .player-card.winner { border-color: #6bcb77; box-shadow: 0 0 30px rgba(107,203,119,0.3); }
        .player-card.loser { opacity: 0.5; border-color: #ff6b6b; }
        .player-card.tie { border-color: #ffd93d; }
        .player-name { font-size: 1.5rem; font-weight: bold; margin-bottom: 15px; }
        .hp-bar-container {
            background: rgba(0,0,0,0.5);
            border-radius: 10px;
            height: 30px;
            overflow: hidden;
            margin-bottom: 10px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .hp-bar {
            height: 100%;
            background: linear-gradient(90deg, #6bcb77, #4d96ff);
            transition: width 0.3s ease;
            border-radius: 10px;
        }
        .hp-bar.danger { background: linear-gradient(90deg, #ff6b6b, #ff8e53); }
        .hp-text { font-size: 1.2rem; font-weight: bold; }
        .move-damage {
            margin-top: 15px;
            font-size: 1.1rem;
            color: #ff6b6b;
        }
        .vs-text {
            font-size: 3rem;
            font-weight: bold;
            color: #ffd93d;
            text-shadow: 0 0 20px rgba(255,217,61,0.5);
        }
        
        .battle-log {
            background: rgba(0,0,0,0.4);
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .battle-log h3 { color: #aaa; margin-bottom: 15px; font-size: 0.9rem; text-transform: uppercase; }
        .log-entry {
            padding: 8px 12px;
            margin-bottom: 5px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            background: rgba(255,255,255,0.05);
        }
        .log-entry.round { color: #4d96ff; font-weight: bold; }
        .log-entry.attack { color: #ff6b6b; }
        .log-entry.eliminated { color: #6bcb77; font-weight: bold; background: rgba(107,203,119,0.2); }
        .log-entry.winner { color: #ffd93d; font-weight: bold; background: rgba(255,217,61,0.2); }
        .log-entry.tie { color: #ffd93d; font-weight: bold; background: rgba(255,217,61,0.3); }
        
        .champion-display {
            display: none;
            text-align: center;
            padding: 40px;
            background: linear-gradient(135deg, rgba(255,217,61,0.1), rgba(107,203,119,0.1));
            border-radius: 20px;
            border: 2px solid #ffd93d;
            margin-bottom: 20px;
        }
        .champion-display.active { display: block; }
        .champion-title { font-size: 1.2rem; color: #aaa; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 3px; }
        .champion-name { font-size: 3rem; font-weight: bold; background: linear-gradient(90deg, #ffd93d, #ff6b6b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 10px; }
        .champion-congrats { font-size: 1.5rem; color: #6bcb77; }
        
        .tournament-bracket { display: none; margin-bottom: 30px; }
        .tournament-bracket.active { display: block; }
        .bracket-title { text-align: center; font-size: 1.3rem; color: #ffd93d; margin-bottom: 20px; }
        .bracket-container { display: flex; justify-content: center; align-items: center; gap: 20px; flex-wrap: wrap; }
        .bracket-round { display: flex; flex-direction: column; gap: 15px; }
        .bracket-match { background: rgba(255,255,255,0.08); border-radius: 10px; padding: 15px; text-align: center; min-width: 150px; border: 1px solid rgba(255,255,255,0.1); }
        .bracket-match.completed { border-color: #6bcb77; }
        .bracket-player { padding: 5px; font-size: 0.9rem; }
        .bracket-player.winner { color: #6bcb77; font-weight: bold; }
        .bracket-player.loser { color: #666; text-decoration: line-through; }
        .bracket-vs { color: #ffd93d; font-size: 0.8rem; margin: 5px 0; }
        
        .battle-progress { text-align: center; margin-bottom: 20px; }
        .round-counter { font-size: 1.2rem; color: #888; margin-bottom: 10px; }
        .progress-bar { background: rgba(255,255,255,0.1); border-radius: 10px; height: 8px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #ff6b6b, #ffd93d, #6bcb77); transition: width 0.3s; }
        
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .shake { animation: shake 0.3s ease; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        .pulse { animation: pulse 0.3s ease; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚔️ 名字大战 ⚔️</h1>
        <p class="subtitle">Name Battle - SHA256 Based Name Battle Game</p>
        
        <!-- Language Toggle -->
        <div class="lang-toggle">
            <button class="lang-btn active" data-lang="cn" onclick="setLanguage('cn')">🇨🇳 中文</button>
            <button class="lang-btn" data-lang="en" onclick="setLanguage('en')">🇺🇸 English</button>
        </div>
        
        <!-- Setup Panel -->
        <div class="setup-panel" id="setupPanel">
            <div class="mode-selector">
                <button class="mode-btn active" data-mode="duel" onclick="setMode('duel')">⚔️ 1v1 对决</button>
                <button class="mode-btn" data-mode="tournament" onclick="setMode('tournament')">🏆 淘汰赛</button>
            </div>
            
            <div class="players-section">
                <h3>参赛选手</h3>
                <div class="player-inputs" id="playerInputs"></div>
                <button class="add-player-btn" id="addPlayerBtn" onclick="addPlayer()" style="display:none">+ 添加选手</button>
            </div>
            
            <button class="start-btn" id="startBtn" onclick="startBattle()">开始战斗</button>
        </div>
        
        <!-- Battle Arena -->
        <div class="battle-arena" id="battleArena">
            <button class="back-btn" onclick="backToSetup()">← 返回</button>
            
            <div class="tournament-bracket" id="tournamentBracket">
                <div class="bracket-title">🏆 淘汰赛对阵图</div>
                <div class="bracket-container" id="bracketContainer"></div>
            </div>
            
            <div class="champion-display" id="championDisplay">
                <div class="champion-title">🏆 冠军 🏆</div>
                <div class="champion-name" id="championName"></div>
                <div class="champion-congrats">🎉 恭喜获得最终胜利！🎉</div>
            </div>
            
            <div class="vs-container" id="vsContainer">
                <div class="player-card" id="player1Card">
                    <div class="player-name" id="player1Name">选手1</div>
                    <div class="hp-bar-container">
                        <div class="hp-bar" id="player1HpBar"></div>
                    </div>
                    <div class="hp-text"><span id="player1Hp">500</span> / 500 HP</div>
                    <div class="move-damage" id="player1Move"></div>
                </div>
                <div class="vs-text">VS</div>
                <div class="player-card" id="player2Card">
                    <div class="player-name" id="player2Name">选手2</div>
                    <div class="hp-bar-container">
                        <div class="hp-bar" id="player2HpBar"></div>
                    </div>
                    <div class="hp-text"><span id="player2Hp">500</span> / 500 HP</div>
                    <div class="move-damage" id="player2Move"></div>
                </div>
            </div>
            
            <div class="battle-progress">
                <div class="round-counter"><span id="roundCounter">0</span></div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>
            
            <div class="battle-log" id="battleLog">
                <h3>⚔️ 战斗记录</h3>
                <div id="logContent"></div>
            </div>
        </div>
    </div>
    
    <script>
        // Game State
        let gameMode = 'duel';
        let language = 'cn';
        let players = ['', ''];
        let battleInterval = null;
        let battleState = null;
        let movesCN = {};
        let movesEN = {};
        
        const MAX_HP = 500;
        const ROUND_INTERVAL = 1000;
        
        // Translations
        const i18n = {
            cn: {
                title: '⚔️ 名字大战 ⚔️',
                subtitle: 'SHA256 Based Name Battle Game',
                duel: '⚔️ 1v1 对决',
                tournament: '🏆 淘汰赛',
                players: '参赛选手',
                playerPlaceholder: '选手',
                addPlayer: '+ 添加选手',
                start: '开始战斗',
                back: '← 返回',
                battleLog: '⚔️ 战斗记录',
                round: '回合',
                hp: 'HP',
                winner: '获胜',
                loser: '失败',
                tie: '平局',
                eliminated: '被淘汰',
                champion: '🏆 冠军 🏆',
                congrats: '🎉 恭喜获得最终胜利！🎉',
                roundLog: '对决开始',
                advance: '晋级',
                damage: '伤害',
                move: '招式'
            },
            en: {
                title: '⚔️ Name Battle ⚔️',
                subtitle: 'SHA256 Based Name Battle Game',
                duel: '⚔️ 1v1 Duel',
                tournament: '🏆 Tournament',
                players: 'Players',
                playerPlaceholder: 'Player',
                addPlayer: '+ Add Player',
                start: 'Start Battle',
                back: '← Back',
                battleLog: '⚔️ Battle Log',
                round: 'Round',
                hp: 'HP',
                winner: 'WINNER',
                loser: 'DEFEATED',
                tie: 'TIE',
                eliminated: 'Eliminated',
                champion: '🏆 CHAMPION 🏆',
                congrats: '🎉 Congratulations! 🎉',
                roundLog: 'Battle Begins',
                advance: 'Advances',
                damage: 'DMG',
                move: 'Move'
            }
        };
        
        async function initMoves() {
            // Load Chinese moves
            try {
                const cnResponse = await fetch('moves-cn.csv');
                const cnText = await cnResponse.text();
                cnText.split('\n').forEach((line, i) => {
                    if (i === 0 || !line.trim()) return;
                    const parts = line.split(',');
                    if (parts.length >= 2) {
                        const dmg = parseInt(parts[0]);
                        const name = parts.slice(1).join(',');
                        movesCN[dmg] = name;
                    }
                });
            } catch (e) { console.log('Could not load moves-cn.csv'); }
            
            // Load English moves
            try {
                const enResponse = await fetch('moves-en.csv');
                const enText = await enResponse.text();
                enText.split('\n').forEach((line, i) => {
                    if (i === 0 || !line.trim()) return;
                    const parts = line.split(',');
                    if (parts.length >= 2) {
                        const dmg = parseInt(parts[0]);
                        const name = parts.slice(1).join(',');
                        movesEN[dmg] = name;
                    }
                });
            } catch (e) { console.log('Could not load moves-en.csv'); }
        }
        
        function setLanguage(lang) {
            language = lang;
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.lang === lang);
            });
            const t = i18n[lang];
            document.querySelector('h1').textContent = t.title;
            document.querySelector('.subtitle').textContent = t.subtitle;
            document.querySelectorAll('.mode-btn')[0].textContent = t.duel;
            document.querySelectorAll('.mode-btn')[1].textContent = t.tournament;
            document.querySelector('.players-section h3').textContent = t.players;
            document.getElementById('startBtn').textContent = t.start;
            document.querySelector('.battle-log h3').textContent = t.battleLog;
            document.getElementById('addPlayerBtn').textContent = t.addPlayer;
            document.querySelector('.champion-title').textContent = t.champion;
            document.querySelector('.champion-congrats').textContent = t.congrats;
            document.querySelector('.bracket-title').textContent = lang === 'cn' ? '🏆 淘汰赛对阵图' : '🏆 Tournament Bracket';
        }
        
        function setMode(mode) {
            gameMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.mode === mode);
            });
            const addBtn = document.getElementById('addPlayerBtn');
            if (mode === 'tournament') {
                addBtn.style.display = 'block';
                while (players.length < 4) players.push('');
            } else {
                addBtn.style.display = 'none';
                players = ['', ''];
            }
            updatePlayerInputs();
        }
        
        function updatePlayerInputs() {
            const container = document.getElementById('playerInputs');
            container.innerHTML = '';
            const t = i18n[language];
            players.forEach((name, i) => {
                const div = document.createElement('div');
                div.className = 'player-input';
                div.innerHTML = `
                    <span class="player-num">${i + 1}</span>
                    <input type="text" id="player${i + 1}" placeholder="${t.playerPlaceholder} ${i + 1}" maxlength="50" value="${name}" oninput="players[${i}] = this.value">
                `;
                container.appendChild(div);
            });
        }
        
        function addPlayer() {
            if (players.length < 16) {
                players.push('');
                updatePlayerInputs();
            }
        }
        
        function isChinese(name) {
            return /[\u4e00-\u9fa5]/.test(name);
        }
        
        function getMoves(name) {
            return isChinese(name) ? movesCN : movesEN;
        }
        
        function getMoveName(damage, playerName) {
            const moves = getMoves(playerName);
            if (moves[damage]) return moves[damage];
            // Fallback: cycle through available moves
            const keys = Object.keys(moves).map(Number);
            if (keys.length === 0) return `Move #${damage}`;
            const closest = keys.reduce((prev, curr) => 
                Math.abs(curr - damage) < Math.abs(prev - damage) ? curr : prev
            );
            return moves[closest] || `Move #${damage}`;
        }
        
        async function startBattle() {
            players = [];
            for (let i = 1; ; i++) {
                const input = document.getElementById(`player${i}`);
                if (!input) break;
                players.push(input.value.trim());
            }
            players = players.filter(p => p !== '');
            
            if (gameMode === 'duel' && players.length < 2) {
                alert(language === 'cn' ? '请输入至少2个选手的名字！' : 'Please enter at least 2 player names!');
                return;
            }
            if (gameMode === 'tournament' && players.length < 2) {
                alert(language === 'cn' ? '淘汰赛至少需要2个选手！' : 'Tournament needs at least 2 players!');
                return;
            }
            
            document.getElementById('setupPanel').style.display = 'none';
            document.getElementById('battleArena').classList.add('active');
            
            if (gameMode === 'tournament') {
                await startTournament();
            } else {
                await startDuel();
            }
        }
        
        function backToSetup() {
            if (battleInterval) {
                clearInterval(battleInterval);
                battleInterval = null;
            }
            document.getElementById('battleArena').classList.remove('active');
            document.getElementById('setupPanel').style.display = 'block';
            document.getElementById('championDisplay').classList.remove('active');
            document.getElementById('tournamentBracket').classList.remove('active');
        }
        
        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }
        
        function getDamageFromHash(hash, index) {
            const useTwoDigits = index % 2 === 0;
            let hexVal;
            if (useTwoDigits && index + 1 < hash.length) {
                hexVal = hash.substring(index, index + 2);
            } else {
                hexVal = hash.substring(index % hash.length, (index % hash.length) + 1);
            }
            let damage = parseInt(hexVal, 16) % 100;
            if (damage === 0) damage = Math.floor(Math.random() * 20) + 1;
            return damage;
        }
        
        function createPlayer(name) {
            return { name, hp: MAX_HP, hash: null };
        }
        
        async function startDuel() {
            const p1 = createPlayer(players[0]);
            const p2 = createPlayer(players[1]);
            p1.hash = await sha256(p1.name);
            p2.hash = await sha256(p2.name);
            
            document.getElementById('player1Name').textContent = p1.name;
            document.getElementById('player2Name').textContent = p2.name;
            document.getElementById('player1Hp').textContent = MAX_HP;
            document.getElementById('player2Hp').textContent = MAX_HP;
            document.getElementById('player1HpBar').style.width = '100%';
            document.getElementById('player2HpBar').style.width = '100%';
            document.getElementById('player1Move').textContent = '';
            document.getElementById('player2Move').textContent = '';
            document.getElementById('player1Card').classList.remove('winner', 'loser', 'tie');
            document.getElementById('player2Card').classList.remove('winner', 'loser', 'tie');
            document.getElementById('logContent').innerHTML = '';
            document.getElementById('roundCounter').textContent = '0';
            
            document.getElementById('tournamentBracket').classList.remove('active');
            document.getElementById('championDisplay').classList.remove('active');
            document.getElementById('vsContainer').style.display = 'flex';
            
            battleState = { p1, p2, round: 0, hashIndex: 0 };
            
            const t = i18n[language];
            addLog(`${t.roundLog}: ${p1.name} VS ${p2.name}`, 'round');
            
            battleInterval = setInterval(runDuelRound, ROUND_INTERVAL);
        }
        
        function runDuelRound() {
            const { p1, p2, hashIndex } = battleState;
            battleState.round++;
            
            const damage1 = getDamageFromHash(p1.hash, hashIndex);
            const damage2 = getDamageFromHash(p2.hash, hashIndex);
            
            p2.hp = Math.max(0, p2.hp - damage1);
            p1.hp = Math.max(0, p1.hp - damage2);
            
            const move1 = getMoveName(damage1, p1.name);
            const move2 = getMoveName(damage2, p2.name);
            
            document.getElementById('player1Hp').textContent = p1.hp;
            document.getElementById('player2Hp').textContent = p2.hp;
            document.getElementById('player1HpBar').style.width = `${(p1.hp / MAX_HP) * 100}%`;
            document.getElementById('player2HpBar').style.width = `${(p2.hp / MAX_HP) * 100}%`;
            document.getElementById('player1Move').textContent = `-${damage2} ${move2}`;
            document.getElementById('player2Move').textContent = `-${damage1} ${move1}`;
            document.getElementById('player1HpBar').classList.toggle('danger', p1.hp < 150);
            document.getElementById('player2HpBar').classList.toggle('danger', p2.hp < 150);
            document.getElementById('roundCounter').textContent = battleState.round;
            document.getElementById('progressFill').style.width = `${((MAX_HP - p1.hp) / MAX_HP) * 100}%`;
            
            const t = i18n[language];
            addLog(`回合 ${battleState.round}: ${p1.name} 使用 ${move1} 对 ${p2.name} 造成 ${damage1} 伤害`, 'attack');
            addLog(`回合 ${battleState.round}: ${p2.name} 使用 ${move2} 对 ${p1.name} 造成 ${damage2} 伤害`, 'attack');
            
            // Check for battle end: death or 15 rounds (tie)
            if (p1.hp <= 0 || p2.hp <= 0 || battleState.round >= 15) {
                clearInterval(battleInterval);
                battleInterval = null;
                
                const p1Card = document.getElementById('player1Card');
                const p2Card = document.getElementById('player2Card');
                
                // Tie conditions: both dead OR 15 rounds reached
                const isTie = (p1.hp <= 0 && p2.hp <= 0) || battleState.round >= 15;
                
                if (isTie) {
                    // Tie
                    if (battleState.round >= 15) {
                        addLog(`💀 15回合平局! ${p1.name} HP: ${p1.hp}, ${p2.name} HP: ${p2.hp}`, 'tie');
                    } else {
                        addLog(`💀 ${t.tie}! ${p1.name} HP: ${p1.hp}, ${p2.name} HP: ${p2.hp}`, 'tie');
                    }
                    p1Card.classList.add('tie');
                    p2Card.classList.add('tie');
                    document.getElementById('player1Move').textContent = t.tie;
                    document.getElementById('player2Move').textContent = t.tie;
                } else {
                    const winner = p1.hp > 0 ? p1 : p2;
                    const loser = p1.hp > 0 ? p2 : p1;
                    addLog(`💀 ${loser.name} ${t.loser}!`, 'eliminated');
                    addLog(`🏆 ${winner.name} ${t.winner}! HP: ${winner.hp}`, 'winner');
                    if (winner === p1) {
                        p1Card.classList.add('winner');
                        p2Card.classList.add('loser');
                    } else {
                        p1Card.classList.add('loser');
                        p2Card.classList.add('winner');
                    }
                }
            }
            
            battleState.hashIndex = (hashIndex + 2) % 64;
        }
        
        async function startTournament() {
            const tournamentPlayers = [...players];
            while (tournamentPlayers.length < tournamentPlayers.length || tournamentPlayers.length < 2) {
                if (tournamentPlayers.length >= 2 && (tournamentPlayers.length & (tournamentPlayers.length - 1)) === 0) break;
                tournamentPlayers.push(null);
            }
            
            document.getElementById('tournamentBracket').classList.add('active');
            document.getElementById('championDisplay').classList.remove('active');
            document.getElementById('vsContainer').style.display = 'none';
            
            let roundIndex = 0;
            let currentRound = [];
            for (let i = 0; i < tournamentPlayers.length; i += 2) {
                currentRound.push({
                    p1: tournamentPlayers[i],
                    p2: tournamentPlayers[i + 1],
                    winner: null
                });
            }
            
            while (currentRound.length >= 1) {
                const nextRound = [];
                for (let i = 0; i < currentRound.length; i += 2) {
                    const match1 = currentRound[i];
                    const match2 = currentRound[i + 1];
                    if (!match1 || !match2) continue;
                    
                    const winner = await runMatch(match1.p1, match1.p2);
                    const winner2 = await runMatch(match2.p1, match2.p2);
                    
                    const finalWinner = await runMatch(winner, winner2);
                    
                    nextRound.push({
                        p1: finalWinner,
                        p2: null,
                        winner: finalWinner
                    });
                }
                
                if (nextRound.length === 1) {
                    const t = i18n[language];
                    document.getElementById('championName').textContent = nextRound[0].p1;
                    document.getElementById('championDisplay').classList.add('active');
                }
                
                roundIndex++;
                if (roundIndex > 10) break;
            }
        }
        
        async function runMatch(p1Name, p2Name) {
            return new Promise((resolve) => {
                if (!p1Name || !p2Name) {
                    resolve(p1Name || p2Name);
                    return;
                }
                
                const p1 = createPlayer(p1Name);
                const p2 = createPlayer(p2Name);
                
                document.getElementById('vsContainer').style.display = 'flex';
                document.getElementById('player1Name').textContent = p1.name;
                document.getElementById('player2Name').textContent = p2.name;
                document.getElementById('player1Hp').textContent = MAX_HP;
                document.getElementById('player2Hp').textContent = MAX_HP;
                document.getElementById('player1HpBar').style.width = '100%';
                document.getElementById('player2HpBar').style.width = '100%';
                document.getElementById('player1Move').textContent = '';
                document.getElementById('player2Move').textContent = '';
                document.getElementById('player1Card').classList.remove('winner', 'loser', 'tie');
                document.getElementById('player2Card').classList.remove('winner', 'loser', 'tie');
                document.getElementById('logContent').innerHTML = '';
                document.getElementById('roundCounter').textContent = '0';
                document.getElementById('championDisplay').classList.remove('active');
                
                sha256(p1.name).then(h => { p1.hash = h; });
                sha256(p2.name).then(h => { p2.hash = h; });
                
                const t = i18n[language];
                addLog(`${t.roundLog}: ${p1.name} VS ${p2.name}`, 'round');
                
                let hashIndex = 0;
                let round = 0;
                
                const matchInterval = setInterval(() => {
                    round++;
                    
                    const damage1 = getDamageFromHash(p1.hash || '', hashIndex);
                    const damage2 = getDamageFromHash(p2.hash || '', hashIndex);
                    
                    p2.hp = Math.max(0, p2.hp - damage1);
                    p1.hp = Math.max(0, p1.hp - damage2);
                    
                    const move1 = getMoveName(damage1, p1.name);
                    const move2 = getMoveName(damage2, p2.name);
                    
                    document.getElementById('player1Hp').textContent = p1.hp;
                    document.getElementById('player2Hp').textContent = p2.hp;
                    document.getElementById('player1HpBar').style.width = `${(p1.hp / MAX_HP) * 100}%`;
                    document.getElementById('player2HpBar').style.width = `${(p2.hp / MAX_HP) * 100}%`;
                    document.getElementById('player1Move').textContent = `-${damage2} ${move2}`;
                    document.getElementById('player2Move').textContent = `-${damage1} ${move1}`;
                    document.getElementById('player1HpBar').classList.toggle('danger', p1.hp < 150);
                    document.getElementById('player2HpBar').classList.toggle('danger', p2.hp < 150);
                    document.getElementById('roundCounter').textContent = round;
                    
                    addLog(`回合 ${round}: ${p1.name} 使用 ${move1} 造成 ${damage1}`, 'attack');
                    addLog(`回合 ${round}: ${p2.name} 使用 ${move2} 造成 ${damage2}`, 'attack');
                    
                    hashIndex = (hashIndex + 2) % 64;
                    
                    // Check for battle end: death or 15 rounds (tie)
                    const isTie = (p1.hp <= 0 && p2.hp <= 0) || round >= 15;
                    
                    if (p1.hp <= 0 || p2.hp <= 0 || round >= 15) {
                        clearInterval(matchInterval);
                        
                        let winner, loser;
                        if (isTie) {
                            winner = p1.hp >= p2.hp ? p1.name : p2.name;
                            loser = p1.hp >= p2.hp ? p2.name : p1.name;
                            if (round >= 15) {
                                addLog(`15回合平局! HP: ${p1.name}=${p1.hp} ${p2.name}=${p2.hp}`, 'tie');
                            } else {
                                addLog(`${t.tie}!`, 'tie');
                            }
                            document.getElementById('player1Card').classList.add('tie');
                            document.getElementById('player2Card').classList.add('tie');
                        } else {
                            winner = p1.hp > 0 ? p1.name : p2.name;
                            loser = p1.hp > 0 ? p2.name : p1.name;
                            addLog(`💀 ${loser} ${t.loser}!`, 'eliminated');
                            addLog(`✅ ${winner} ${t.advance}!`, 'winner');
                            if (winner === p1.name) {
                                document.getElementById('player1Card').classList.add('winner');
                                document.getElementById('player2Card').classList.add('loser');
                            } else {
                                document.getElementById('player1Card').classList.add('loser');
                                document.getElementById('player2Card').classList.add('winner');
                            }
                        }
                        
                        setTimeout(() => resolve(winner), 1000);
                    }
                }, ROUND_INTERVAL);
            });
        }
        
        function addLog(message, type) {
            const logContent = document.getElementById('logContent');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = message;
            logContent.appendChild(entry);
            logContent.scrollTop = logContent.scrollHeight;
        }
        
        // Initialize
        initMoves();
        updatePlayerInputs();
    </script>
</body>
